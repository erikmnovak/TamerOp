<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1920" viewBox="0 0 1200 1920">

    <defs>
      <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6"
              orient="auto" markerUnits="strokeWidth">
        <path d="M 0 0 L 12 6 L 0 12 z" fill="#222"/>
      </marker>
      <style><![CDATA[
        text { font-family: Helvetica, Arial, sans-serif; fill: #111; }
        .small { font-size: 13px; }
        .tiny { font-size: 12px; }
        .label { font-size: 16px; font-weight: 700; }
        .title { font-size: 15px; font-weight: 700; }
        .box { stroke: #222; stroke-width: 2; rx: 10; ry: 10; }
        .group { stroke: #111; stroke-width: 3; fill: #f2f2f2; rx: 14; ry: 14; }
        .arrow { stroke: #222; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      ]]></style>
    </defs>
    <rect x="70" y="70" width="1060" height="315" rx="14" ry="14" fill="#f2f2f2" stroke="#111" stroke-width="3" class=""/><text x="90" y="98" text-anchor="start">  <tspan x="90" dy="0" style="font-size:16px; font-weight:700;">Data ingestion</tspan></text><rect x="90" y="110" width="320" height="125" rx="10" ry="10" fill="#d9f2d9" stroke="#222" stroke-width="2" class=""/><text x="104" y="138" text-anchor="start">  <tspan x="104" dy="0" style="font-size:15px; font-weight:700;">Point clouds</tspan>  <tspan x="104" dy="17" style="font-size:13px; font-weight:normal;">(Euclidean or embedded)</tspan>  <tspan x="104" dy="17" style="font-size:13px; font-weight:normal;">(possibly weighted)</tspan></text><rect x="440" y="110" width="320" height="125" rx="10" ry="10" fill="#d9f2d9" stroke="#222" stroke-width="2" class=""/><text x="454" y="138" text-anchor="start">  <tspan x="454" dy="0" style="font-size:15px; font-weight:700;">Point clouds + functions</tspan>  <tspan x="454" dy="17" style="font-size:13px; font-weight:normal;">scalar/vector measurements</tspan>  <tspan x="454" dy="17" style="font-size:13px; font-weight:normal;">(lower-star / sublevel data)</tspan></text><rect x="790" y="110" width="320" height="125" rx="10" ry="10" fill="#d9f2d9" stroke="#222" stroke-width="2" class=""/><text x="804" y="138" text-anchor="start">  <tspan x="804" dy="0" style="font-size:15px; font-weight:700;">Images / voxel grids</tspan>  <tspan x="804" dy="17" style="font-size:13px; font-weight:normal;">cubical data</tspan>  <tspan x="804" dy="17" style="font-size:13px; font-weight:normal;">(intensity, density, …)</tspan></text><rect x="90" y="260" width="320" height="125" rx="10" ry="10" fill="#d9f2d9" stroke="#222" stroke-width="2" class=""/><text x="104" y="288" text-anchor="start">  <tspan x="104" dy="0" style="font-size:14px; font-weight:700;">Metric spaces / distance matrices</tspan>  <tspan x="104" dy="17" style="font-size:13px; font-weight:normal;">given metric or kNN graph</tspan>  <tspan x="104" dy="17" style="font-size:13px; font-weight:normal;">(sparse variants)</tspan></text><rect x="440" y="260" width="320" height="125" rx="10" ry="10" fill="#d9f2d9" stroke="#222" stroke-width="2" class=""/><text x="454" y="288" text-anchor="start">  <tspan x="454" dy="0" style="font-size:14px; font-weight:700;">Metric + auxiliary functions</tspan>  <tspan x="454" dy="17" style="font-size:13px; font-weight:normal;">distance + one/many filters</tspan>  <tspan x="454" dy="17" style="font-size:13px; font-weight:normal;">(bifiltration / multifiltration)</tspan></text><rect x="790" y="260" width="320" height="125" rx="10" ry="10" fill="#d9f2d9" stroke="#222" stroke-width="2" class=""/><text x="804" y="288" text-anchor="start">  <tspan x="804" dy="0" style="font-size:14px; font-weight:700;">Complexes / graphs (user)</tspan>  <tspan x="804" dy="17" style="font-size:13px; font-weight:normal;">simplicial / cubical complexes</tspan>  <tspan x="804" dy="17" style="font-size:13px; font-weight:normal;">weighted graphs, networks</tspan></text><line x1="250.0" y1="235" x2="250.0" y2="260" class="arrow"/><text x="250.0" y="241.5" text-anchor="middle" style="font-size:12px;">choose metric</text><line x1="600.0" y1="235" x2="600.0" y2="260" class="arrow"/><text x="600.0" y="241.5" text-anchor="middle" style="font-size:12px;">metric + filters</text><line x1="950.0" y1="235" x2="950.0" y2="260" class="arrow"/><text x="950.0" y="241.5" text-anchor="middle" style="font-size:12px;">cubical structure</text><rect x="90" y="420" width="1020" height="230" rx="10" ry="10" fill="#e8f5e9" stroke="#7a0015" stroke-width="3" class=""/><text x="108" y="450" text-anchor="start">  <tspan x="108" dy="0" style="font-size:15px; font-weight:700;">Multifiltration constructors (bifiltration and beyond)</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">Build a functor F: Q → Top (or Simp / Cub) for an indexing poset Q,</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">typically Q ⊆ ℝⁿ or Q ⊆ ℤⁿ.</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">• Simplicial: Rips / Čech / alpha / witness (sparse, weighted, kNN variants)</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">• Lower-star / sublevel: on simplicial, cubical, or Delaunay-type constructions</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">• RIVET-class bifiltrations: Rips–lower-star, degree-Rips, Delaunay lower-star/core</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">• Multicover / rhomboid / density-style: multicover bifiltrations and related constructions</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">• User-defined: products of monotone filters, custom grades, domain-specific filtrations</tspan></text><line x1="250.0" y1="385" x2="210" y2="420" class="arrow"/><text x="230.0" y="394.5" text-anchor="middle" style="font-size:11px;">Rips / Čech / alpha / graph-based</text><line x1="600.0" y1="385" x2="600.0" y2="420" class="arrow"/><text x="600.0" y="394.5" text-anchor="middle" style="font-size:11px;">lower-star, function-Rips, mixed</text><line x1="950.0" y1="385" x2="990" y2="420" class="arrow"/><text x="970.0" y="394.5" text-anchor="middle" style="font-size:11px;">cubical / user complex / graph</text><rect x="90" y="675" width="1020" height="100" rx="10" ry="10" fill="#fff3c6" stroke="#222" stroke-width="2" class=""/><text x="108" y="705" text-anchor="start">  <tspan x="108" dy="0" style="font-size:15px; font-weight:700;">Filtered chain models (“FIRep”-style interface)</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">Convert F into computable algebra: filtered simplicial/cubical chain complexes,</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">boundary maps, and free Q-indexed algebraic data; persistent (co)homology is homology over a field.</tspan></text><line x1="600.0" y1="650" x2="600.0" y2="675" class="arrow"/><text x="600.0" y="656.5" text-anchor="middle" style="font-size:11px;">chains / boundary matrices</text><rect x="90" y="793" width="1020" height="150" rx="10" ry="10" fill="#fff3c6" stroke="#222" stroke-width="2" class=""/><text x="108" y="823" text-anchor="start">  <tspan x="108" dy="0" style="font-size:15px; font-weight:700;">Tame module interface (finite data describing a Q-module)</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">Represent the multiparameter persistence module M: Q → Vectₖ using finite algebraic input, e.g.</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">• Fringe/flange presentations: indicator upsets and downsets + a “monomial” matrix φ</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">• Short complexes of free modules: presentations suitable for resolutions and derived functors</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">• Backends: Q = ℤⁿ (lattice), Q = ℝⁿ (polyhedral/PL), or user posets</tspan></text><line x1="600.0" y1="775" x2="600.0" y2="793" class="arrow"/><text x="600.0" y="778.0" text-anchor="middle" style="font-size:11px;">persistent (co)homology modules</text><rect x="90" y="961" width="1020" height="145" rx="10" ry="10" fill="#ffe0c7" stroke="#222" stroke-width="2" class=""/><text x="108" y="991" text-anchor="start">  <tspan x="108" dy="0" style="font-size:15px; font-weight:700;">Finite encoding constructors (the TAMER step)</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">Construct an order-preserving encoding map π: Q → P with P a finite poset of regions</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">(common-encoding multiple modules when desired).</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">• Compute region signatures/strata where behavior is constant (finitely many regions)</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">• Multiple geometric backends (lattice / polyhedral / axis-aligned PL / hybrid)</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">• Output: P and a transported module on P capturing the Q-module up to the encoding</tspan></text><line x1="600.0" y1="943" x2="600.0" y2="961" class="arrow"/><text x="600.0" y="946.0" text-anchor="middle" style="font-size:11px;">build π: Q → P</text><rect x="90" y="1124" width="1020" height="135" rx="10" ry="10" fill="#e8f5e9" stroke="#7a0015" stroke-width="3" class=""/><text x="108" y="1154" text-anchor="start">  <tspan x="108" dy="0" style="font-size:15px; font-weight:700;">Encoded poset module (computational core object)</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">A finite representation M_P ∈ Rep(P): stalk dimensions and structure maps on cover relations.</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">• Exact linear algebra over k on finite data</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">• Functorial transport along poset maps; caching for repeated queries</tspan>  <tspan x="108" dy="17" style="font-size:13px; font-weight:normal;">• Common input to invariants, derived functors, visualization, and statistics</tspan></text><line x1="600.0" y1="1106" x2="600.0" y2="1124" class="arrow"/><text x="600.0" y="1109.0" text-anchor="middle" style="font-size:11px;">transport along π</text><rect x="70" y="1274" width="1060" height="680" rx="14" ry="14" fill="#f2f2f2" stroke="#111" stroke-width="3" class=""/><text x="90" y="1302" text-anchor="start">  <tspan x="90" dy="0" style="font-size:16px; font-weight:700;">After encoding: analysis, visualization, and statistics</tspan></text><rect x="90" y="1329" width="495.0" height="180" rx="10" ry="10" fill="#dbe9ff" stroke="#222" stroke-width="2" class=""/><text x="106" y="1359" text-anchor="start">  <tspan x="106" dy="0" style="font-size:15px; font-weight:700;">Invariants &amp; summaries</tspan>  <tspan x="106" dy="17" style="font-size:13px; font-weight:normal;">• Hilbert/dimension; rank queries</tspan>  <tspan x="106" dy="17" style="font-size:13px; font-weight:normal;">• Rank invariant and Möbius inversions</tspan>  <tspan x="106" dy="17" style="font-size:13px; font-weight:normal;">• Signed rectangle measures (“signed barcodes”)</tspan>  <tspan x="106" dy="17" style="font-size:13px; font-weight:normal;">• Slice barcodes; landscapes/images; distances/kernels</tspan></text><rect x="615.0" y="1329" width="495.0" height="180" rx="10" ry="10" fill="#dbe9ff" stroke="#222" stroke-width="2" class=""/><text x="631.0" y="1359" text-anchor="start">  <tspan x="631.0" dy="0" style="font-size:15px; font-weight:700;">Homological algebra</tspan>  <tspan x="631.0" dy="17" style="font-size:13px; font-weight:normal;">• Projective/injective resolutions (minimal when possible)</tspan>  <tspan x="631.0" dy="17" style="font-size:13px; font-weight:normal;">• Betti/Bass tables; Ext and Tor; Yoneda products</tspan>  <tspan x="631.0" dy="17" style="font-size:13px; font-weight:normal;">• Chain complexes of P-modules; derived functors</tspan>  <tspan x="631.0" dy="17" style="font-size:13px; font-weight:normal;">• Commutative-algebra style data when applicable (primes, socle)</tspan></text><rect x="90" y="1534" width="495.0" height="180" rx="10" ry="10" fill="#dbe9ff" stroke="#222" stroke-width="2" class=""/><text x="106" y="1564" text-anchor="start">  <tspan x="106" dy="0" style="font-size:15px; font-weight:700;">Visualization (documentation &amp; exploration)</tspan>  <tspan x="106" dy="17" style="font-size:13px; font-weight:normal;">• Rank/Hilbert/Euler surfaces on chosen grids</tspan>  <tspan x="106" dy="17" style="font-size:13px; font-weight:normal;">• Signed-rectangle summaries; fibered arrangements</tspan>  <tspan x="106" dy="17" style="font-size:13px; font-weight:normal;">• Slice families and barcode plots; interactive 2D/3D views</tspan>  <tspan x="106" dy="17" style="font-size:13px; font-weight:normal;">• Comparatives across samples / parameter choices</tspan></text><rect x="615.0" y="1534" width="495.0" height="180" rx="10" ry="10" fill="#dbe9ff" stroke="#222" stroke-width="2" class=""/><text x="631.0" y="1564" text-anchor="start">  <tspan x="631.0" dy="0" style="font-size:15px; font-weight:700;">Transport &amp; comparison</tspan>  <tspan x="631.0" dy="17" style="font-size:13px; font-weight:normal;">• Restriction to chains/slices; pushforward/pullback along poset maps</tspan>  <tspan x="631.0" dy="17" style="font-size:13px; font-weight:normal;">• Comparison maps between computational models (when multiple exist)</tspan>  <tspan x="631.0" dy="17" style="font-size:13px; font-weight:normal;">• Functoriality of invariants and derived constructions</tspan>  <tspan x="631.0" dy="17" style="font-size:13px; font-weight:normal;">• Workflows for library-to-library comparison (RIVET/multipers-style)</tspan></text><rect x="90" y="1739" width="495.0" height="180" rx="10" ry="10" fill="#dbe9ff" stroke="#222" stroke-width="2" class=""/><text x="106" y="1769" text-anchor="start">  <tspan x="106" dy="0" style="font-size:15px; font-weight:700;">Statistics &amp; ML layer</tspan>  <tspan x="106" dy="17" style="font-size:13px; font-weight:normal;">• Region weights/volumes; support geometry; uncertainty quantification</tspan>  <tspan x="106" dy="17" style="font-size:13px; font-weight:normal;">• Feature vectors and kernel methods from invariant outputs</tspan>  <tspan x="106" dy="17" style="font-size:13px; font-weight:normal;">• Hypothesis tests, model selection, cross-validation pipelines</tspan>  <tspan x="106" dy="17" style="font-size:13px; font-weight:normal;">• Scalable summaries for downstream learning tasks</tspan></text><rect x="615.0" y="1739" width="495.0" height="180" rx="10" ry="10" fill="#dbe9ff" stroke="#222" stroke-width="2" class=""/><text x="631.0" y="1769" text-anchor="start">  <tspan x="631.0" dy="0" style="font-size:15px; font-weight:700;">Export &amp; interoperability</tspan>  <tspan x="631.0" dy="17" style="font-size:13px; font-weight:normal;">• JSON serialization of presentations, encodings, and summaries</tspan>  <tspan x="631.0" dy="17" style="font-size:13px; font-weight:normal;">• Bridges to CAS workflows (e.g. commutative algebra tooling)</tspan>  <tspan x="631.0" dy="17" style="font-size:13px; font-weight:normal;">• Reproducible benchmarks; provenance of encodings and grids</tspan>  <tspan x="631.0" dy="17" style="font-size:13px; font-weight:normal;">• Standard artifacts for papers, notebooks, and reports</tspan></text><line x1="600.0" y1="1259" x2="600.0" y2="1274" class="arrow"/><text x="600.0" y="1260.5" text-anchor="middle" style="font-size:11px;">API calls / algorithms</text>
</svg>
